name: Refresh Substack Cache

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh Substack cache
        run: npm run refresh:substack

      - name: Run tests
        run: npm test

      - name: Commit updated cache
        run: |
          if git diff --quiet -- src/data/substack-cache.json; then
            echo "No cache changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/substack-cache.json
          git commit -m "chore: refresh Substack cache"
          git push
